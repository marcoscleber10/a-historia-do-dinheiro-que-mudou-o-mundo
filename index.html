<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Clube DCA — Bitcoin DCA Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

<style>
    :root {
        --btc: #F7931A;
        --btc-dim: rgba(247,147,26,0.15);
        --btc-border: rgba(247,147,26,0.35);
        --green: #10B981;
        --red: #EF4444;
        --blue: #60A5FA;
        --purple: #A78BFA;
        --bg: #0a0e1a;
        --bg-card: #111827;
        --bg-sidebar: #0d1117;
        --bg-hover: rgba(255,255,255,0.05);
        --border: rgba(255,255,255,0.08);
        --text: #F1F5F9;
        --text-dim: rgba(255,255,255,0.45);
        --text-faint: rgba(255,255,255,0.2);
        --sidebar-w: 220px;
        --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; }
    /* ── SIDEBAR ── */
    .sidebar {
        width: var(--sidebar-w);
        background: var(--bg-sidebar);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        position: fixed;
        top: 0; left: 0; bottom: 0;
        z-index: 100;
        transition: transform 0.25s ease;
    }
    .sidebar-logo {
        padding: 1.4rem 1.2rem 1rem;
        border-bottom: 1px solid var(--border);
    }
    .sidebar-logo-top {
        display: flex; align-items: center; gap: 10px;
        margin-bottom: 2px;
    }
    .sidebar-logo-icon {
        width: 36px; height: 36px;
        background: linear-gradient(135deg, #F7931A, #e07a10);
        border-radius: 10px;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
    }
    .sidebar-logo-name {
        font-size: 1.05rem; font-weight: 900; color: #fff;
        line-height: 1.1;
    }
    .sidebar-logo-name span { color: var(--btc); }
    .sidebar-logo-sub {
        font-size: 0.6rem; color: var(--text-dim);
        font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em;
        padding-left: 46px;
    }
    .sidebar-nav { flex: 1; padding: 0.75rem 0.6rem; overflow-y: auto; }
    .sidebar-nav-item {
        display: flex; align-items: center; gap: 10px;
        padding: 0.65rem 0.85rem;
        border-radius: 9px;
        cursor: pointer;
        font-size: 0.82rem; font-weight: 600;
        color: var(--text-dim);
        transition: all 0.15s;
        margin-bottom: 2px;
        text-decoration: none;
        user-select: none;
    }
    .sidebar-nav-item:hover { background: var(--bg-hover); color: #fff; }
    .sidebar-nav-item.active { background: var(--btc-dim); color: var(--btc); border: 1px solid var(--btc-border); }
    .sidebar-nav-item svg { flex-shrink: 0; }
    .sidebar-footer {
        padding: 0.75rem 0.6rem;
        border-top: 1px solid var(--border);
    }
    .sidebar-user {
        display: flex; align-items: center; gap: 8px;
        padding: 0.5rem 0.85rem;
        border-radius: 9px;
    }
    .sidebar-user-avatar {
        width: 28px; height: 28px;
        background: linear-gradient(135deg, var(--btc), #e07a10);
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-size: 0.7rem; font-weight: 800; color: #000;
    }
    .sidebar-user-name { font-size: 0.75rem; font-weight: 700; color: var(--text-dim); flex: 1; }
    .sidebar-logout {
        display: flex; align-items: center; gap: 10px;
        padding: 0.6rem 0.85rem;
        border-radius: 9px;
        cursor: pointer;
        font-size: 0.82rem; font-weight: 600;
        color: var(--text-faint);
        transition: all 0.15s;
        margin-top: 2px;
    }
    .sidebar-logout:hover { background: rgba(239,68,68,0.1); color: var(--red); }
    /* ── MAIN ── */
    .main-content {
        margin-left: var(--sidebar-w);
        flex: 1;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
    }
    .topbar {
        background: var(--bg-sidebar);
        border-bottom: 1px solid var(--border);
        padding: 0.85rem 1.5rem;
        display: flex; align-items: center; justify-content: space-between;
        position: sticky; top: 0; z-index: 50;
    }
    .topbar-title { font-size: 1.1rem; font-weight: 800; color: #fff; }
    .topbar-right { display: flex; align-items: center; gap: 0.75rem; }
    .btc-live-badge {
        display: flex; align-items: center; gap: 6px;
        background: var(--btc-dim); border: 1px solid var(--btc-border);
        border-radius: 20px; padding: 5px 12px;
        font-size: 0.72rem; font-weight: 800; color: var(--btc);
    }
    .live-dot {
        width: 6px; height: 6px; background: var(--green);
        border-radius: 50%; animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
    .hamburger {
        display: none; background: none; border: none;
        color: var(--text); cursor: pointer; padding: 4px;
    }
    /* ── PAGES ── */
    .page { display: none; padding: 1.5rem; }
    .page.active { display: block; }
    /* ── KPI CARDS ── */
    .kpi-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1rem;
        margin-bottom: 1.25rem;
    }
    .kpi-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1rem 1.1rem;
        position: relative;
        overflow: hidden;
    }
    .kpi-card::before {
        content: '';
        position: absolute; top: 0; left: 0; right: 0; height: 3px;
        border-radius: var(--radius) var(--radius) 0 0;
    }
    .kpi-card.orange::before { background: linear-gradient(90deg, var(--btc), #e07a10); }
    .kpi-card.green::before { background: linear-gradient(90deg, var(--green), #059669); }
    .kpi-card.blue::before { background: linear-gradient(90deg, var(--blue), #3b82f6); }
    .kpi-card.purple::before { background: linear-gradient(90deg, var(--purple), #7c3aed); }
    .kpi-card.red::before { background: linear-gradient(90deg, var(--red), #dc2626); }
    .kpi-label {
        font-size: 0.65rem; font-weight: 700; color: var(--text-dim);
        text-transform: uppercase; letter-spacing: 0.07em;
        margin-bottom: 0.4rem;
    }
    .kpi-value {
        font-size: 1.3rem; font-weight: 900; color: #fff;
        line-height: 1.2; margin-bottom: 0.2rem;
    }
    .kpi-value.btc { color: var(--btc); }
    .kpi-sub {
        font-size: 0.68rem; color: var(--text-dim);
    }
    .kpi-badge {
        display: inline-flex; align-items: center; gap: 3px;
        font-size: 0.65rem; font-weight: 800;
        border-radius: 5px; padding: 2px 6px;
        margin-top: 3px;
    }
    .kpi-badge.up { background: rgba(16,185,129,0.12); color: var(--green); }
    .kpi-badge.down { background: rgba(239,68,68,0.12); color: var(--red); }
    /* ── CHARTS ── */
    .charts-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1rem;
        margin-bottom: 1.25rem;
    }
    .charts-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
    }
    .chart-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1.1rem;
    }
    .chart-card-header {
        display: flex; align-items: center; justify-content: space-between;
        margin-bottom: 1rem;
    }
    .chart-card-title {
        font-size: 0.8rem; font-weight: 800; color: #fff;
        display: flex; align-items: center; gap: 6px;
    }
    .chart-card-sub { font-size: 0.65rem; color: var(--text-dim); margin-top: 1px; }
    /* ── COMPRAS TABLE ── */
    .page-header {
        display: flex; align-items: center; justify-content: space-between;
        margin-bottom: 1.25rem;
    }
    .page-title { font-size: 1.05rem; font-weight: 800; color: #fff; }
    .btn-primary {
        display: flex; align-items: center; gap: 6px;
        background: linear-gradient(135deg, var(--btc), #e07a10);
        border: none; color: #000; font-weight: 800;
        font-size: 0.78rem; padding: 0.6rem 1.1rem;
        border-radius: 8px; cursor: pointer;
        transition: opacity 0.15s;
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-secondary {
        display: flex; align-items: center; gap: 6px;
        background: rgba(255,255,255,0.06); border: 1px solid var(--border);
        color: var(--text); font-weight: 700; font-size: 0.75rem;
        padding: 0.55rem 1rem; border-radius: 8px; cursor: pointer;
        transition: background 0.15s;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.1); }
    .table-wrap {
        background: var(--bg-card); border: 1px solid var(--border);
        border-radius: var(--radius); overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead { background: rgba(255,255,255,0.03); }
    th {
        padding: 0.7rem 1rem; text-align: left;
        font-size: 0.65rem; font-weight: 800; color: var(--text-dim);
        text-transform: uppercase; letter-spacing: 0.07em;
        border-bottom: 1px solid var(--border);
    }
    td {
        padding: 0.75rem 1rem;
        font-size: 0.8rem; color: var(--text);
        border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg-hover); }
    .td-plat {
        display: inline-flex; align-items: center; gap: 5px;
        background: var(--btc-dim); border: 1px solid var(--btc-border);
        color: var(--btc); border-radius: 5px; padding: 2px 8px;
        font-size: 0.68rem; font-weight: 700;
    }
    .td-sats { color: var(--btc); font-weight: 700; font-family: monospace; }
    .td-delete {
        background: none; border: none; color: var(--text-faint);
        cursor: pointer; padding: 4px; border-radius: 5px;
        transition: all 0.15s;
    }
    .td-delete:hover { color: var(--red); background: rgba(239,68,68,0.1); }
    /* ── MODAL ── */
    .modal-overlay {
        display: none; position: fixed; inset: 0;
        background: rgba(0,0,0,0.7); z-index: 200;
        align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
        background: var(--bg-card); border: 1px solid var(--border);
        border-radius: 16px; padding: 1.5rem;
        width: 100%; max-width: 420px; margin: 1rem;
    }
    .modal-title {
        font-size: 1rem; font-weight: 800; color: #fff;
        margin-bottom: 1.25rem; display: flex; align-items: center; gap: 8px;
    }
    .form-group { margin-bottom: 1rem; }
    .form-label { font-size: 0.72rem; font-weight: 700; color: var(--text-dim); margin-bottom: 0.35rem; display: block; text-transform: uppercase; letter-spacing: 0.05em; }
    .form-input {
        width: 100%; background: rgba(255,255,255,0.05);
        border: 1px solid var(--border); border-radius: 8px;
        padding: 0.65rem 0.9rem; color: var(--text);
        font-size: 0.85rem; outline: none;
        transition: border-color 0.15s;
    }
    .form-input:focus { border-color: var(--btc); }
    .form-input option { background: #1a1f2e; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .form-hint { font-size: 0.65rem; color: var(--text-faint); margin-top: 0.25rem; }
    .modal-actions { display: flex; gap: 0.75rem; margin-top: 1.25rem; }
    .modal-actions .btn-primary { flex: 1; justify-content: center; }
    .modal-actions .btn-secondary { flex: 0; }
    /* ── EMPTY STATE ── */
    .empty-state {
        text-align: center; padding: 3rem 1rem;
        color: var(--text-dim);
    }
    .empty-state svg { margin-bottom: 1rem; opacity: 0.3; }
    .empty-state h3 { font-size: 0.9rem; font-weight: 700; margin-bottom: 0.5rem; }
    .empty-state p { font-size: 0.75rem; }
    /* ── VITRINE ── */
    .vitrine-card {
        background: linear-gradient(135deg, #0d1117, #161b27);
        border: 1px solid rgba(247,147,26,0.2);
        border-radius: 16px; padding: 1.75rem;
        text-align: center; max-width: 420px; margin: 0 auto;
    }
    .vitrine-title { font-size: 1.3rem; font-weight: 900; color: #fff; margin-bottom: 0.25rem; }
    .vitrine-subtitle { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 1.5rem; }
    .vitrine-kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1.25rem; }
    .vitrine-kpi { background: rgba(255,255,255,0.04); border-radius: 10px; padding: 0.85rem; }
    .vitrine-kpi-label { font-size: 0.6rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.3rem; }
    .vitrine-kpi-value { font-size: 1rem; font-weight: 900; color: #fff; }
    .vitrine-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--btc-dim); border: 1px solid var(--btc-border); color: var(--btc); border-radius: 20px; padding: 5px 14px; font-size: 0.72rem; font-weight: 800; margin-bottom: 1rem; }
    .vitrine-share-btn { display: flex; align-items: center; justify-content: center; gap: 6px; background: linear-gradient(135deg, var(--btc), #e07a10); border: none; color: #000; font-weight: 800; font-size: 0.78rem; padding: 0.65rem 1.25rem; border-radius: 8px; cursor: pointer; margin: 0 auto; transition: opacity 0.15s; }
    .vitrine-share-btn:hover { opacity: 0.85; }
    /* ── ANALISE ── */
    .analise-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1rem; margin-bottom: 1.25rem; }
    .analise-stat { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.1rem; }
    .analise-stat-label { font-size: 0.65rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 0.35rem; }
    .analise-stat-value { font-size: 1.1rem; font-weight: 900; }
    /* ── MOBILE BOTTOM NAV ── */
    .mobile-bottom-nav {
        display: none;
        position: fixed;
        bottom: 0; left: 0; right: 0;
        background: #0d1117;
        border-top: 1px solid rgba(255,255,255,0.08);
        z-index: 200;
        padding: 6px 0 env(safe-area-inset-bottom, 6px);
        overflow-x: auto;
    }
    .mobile-bottom-nav::-webkit-scrollbar { display: none; }
    .mobile-nav-inner {
        display: flex;
        min-width: max-content;
        padding: 0 6px;
        gap: 2px;
    }
    .mnav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 5px 10px;
        border-radius: 10px;
        cursor: pointer;
        border: none;
        background: none;
        color: rgba(255,255,255,0.35);
        font-size: 8.5px;
        font-weight: 700;
        white-space: nowrap;
        gap: 3px;
        min-width: 52px;
        transition: color 0.15s, background 0.15s;
    }
    .mnav-item.active {
        color: #F7931A;
        background: rgba(247,147,26,0.12);
    }
    .mnav-item svg { flex-shrink: 0; }
    @media (max-width: 900px) {
        .sidebar { display: none !important; }
        .main-content { margin-left: 0 !important; }
        .hamburger { display: none !important; }
        .mobile-bottom-nav { display: block; }
        .kpi-grid { grid-template-columns: repeat(2, 1fr); }
        .charts-row { grid-template-columns: 1fr; }
        .page { padding: 0.75rem; padding-bottom: 80px; }
        .analise-grid { grid-template-columns: repeat(2,1fr); }
        .sidebar-overlay { display: none !important; }
    }
    @media (max-width: 480px) {
        .kpi-grid { grid-template-columns: 1fr 1fr; }
        .kpi-value { font-size: 1rem; }
        table { font-size: 0.72rem; }
        th, td { padding: 0.6rem 0.6rem; }
    }
    /* ── SPINNER ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 0.8s linear infinite; }
    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
</style>
</head>

        </div>
        <div class="sidebar-nav-item" onclick="showPage('streaming', this)" style="color:#EF4444;margin-top:2px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#EF4444" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
            Streaming
        </div>
        <div class="sidebar-nav-item" onclick="showPage('carteira2030', this)" style="color:#F59E0B;margin-top:6px;border-top:1px solid rgba(255,255,255,0.06);padding-top:12px;font-weight:900;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#F59E0B" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            Carteira 2030
        </div>
    </nav>
    <div class="sidebar-footer">
        <div class="sidebar-user">
            <div class="sidebar-user-avatar">M</div>
            <div class="sidebar-user-name">Marcos</div>
        </div>
        <div class="sidebar-logout" onclick="clearAllData()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Limpar Dados
        </div>
    </div>
</aside>

<!-- Main Content -->
<div class="main-content">
    <!-- Topbar -->
    <div class="topbar">
        <div style="display:flex;align-items:center;gap:12px;">
            <button class="hamburger" onclick="toggleSidebar()">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <div class="topbar-title" id="topbar-title">Dashboard</div>
        </div>
        <div class="topbar-right">
            <div class="btc-live-badge">
                <div class="live-dot"></div>
                <span id="btc-price-topbar">BTC ...</span>
            </div>
            <button class="btn-secondary" onclick="addCompra()">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Registrar DCA
            </button>
        </div>
    </div>

    <!-- PÁGINAS (HTML SIMPLIFICADO - O CONTEÚDO DAS PÁGINAS É GERADO VIA JS) -->
    <div id="page-dashboard" class="page active"></div>
    <div id="page-compras" class="page"></div>
    <div id="page-analise" class="page"></div>
    <div id="page-vitrine" class="page"></div>
    <div id="page-admin" class="page"></div>
    <div id="page-cotacao" class="page"></div>
    <div id="page-sinaisdefi" class="page"></div>
    <div id="page-apoio" class="page"></div>
    <div id="page-precojusto" class="page"></div>
    <div id="page-poolsdefi" class="page"></div>
    <div id="page-streaming" class="page"></div>
    <div id="page-carteira2030" class="page"></div>
</div>

<!-- Mobile Bottom Navigation -->
<div class="mobile-bottom-nav" id="mobile-bottom-nav">
    <div class="mobile-nav-inner" id="mobile-nav-inner"></div>
</div>

<script>
    // ==================== CONSTANTES E VARIÁVEIS GLOBAIS ====================
    let compras = [];
    let btcPrice = 0;
    let ethPrice = 0;
    let solPrice = 0;
    let usdBrl = 5.7;
    let charts = {};
    let userName = "Marcos";

    // ==================== STORAGE ====================
    function saveToLocalStorage() {
        localStorage.setItem('dca_compras', JSON.stringify(compras));
        localStorage.setItem('dca_userName', userName);
    }

    function loadFromLocalStorage() {
        const saved = localStorage.getItem('dca_compras');
        if (saved) compras = JSON.parse(saved);
        const savedName = localStorage.getItem('dca_userName');
        if (savedName) userName = savedName;
    }

    // ==================== FUNÇÕES AUXILIARES ====================
    function formatBRL(value) {
        return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value);
    }

    function formatUSD(value) {
        return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(value);
    }

    function formatSats(btc) {
        return Math.round(btc * 100000000).toLocaleString('pt-BR');
    }

    // ==================== ATUALIZAR COTAÇÕES ====================
    async function atualizarCotacoes() {
        try {
            const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana&vs_currencies=usd,brl');
            const data = await response.json();
            btcPrice = data.bitcoin.usd;
            ethPrice = data.ethereum.usd;
            solPrice = data.solana.usd;
            usdBrl = data.bitcoin.brl / btcPrice;
            
            document.getElementById('btc-price-topbar').innerHTML = `BTC $${btcPrice.toLocaleString()}`;
            document.getElementById('kpi-btc-usd').innerHTML = `$${btcPrice.toLocaleString()}`;
            document.getElementById('kpi-usd-brl').innerHTML = `USD/BRL: ${usdBrl.toFixed(2)}`;
            
            renderDashboard();
        } catch (error) {
            console.error('Erro ao buscar cotações:', error);
        }
    }

    // ==================== RENDER DASHBOARD ====================
    function renderDashboard() {
        if (compras.length === 0) {
            document.getElementById('page-dashboard').innerHTML = `
                <div class="kpi-grid">
                    <div class="kpi-card orange"><div class="kpi-label">Total Investido</div><div class="kpi-value">R$ 0,00</div><div class="kpi-sub">0 compras</div></div>
                    <div class="kpi-card orange"><div class="kpi-label">BTC Acumulado</div><div class="kpi-value btc">0 sats</div><div class="kpi-sub">0.00000000 BTC</div></div>
                    <div class="kpi-card green"><div class="kpi-label">Valor Atual</div><div class="kpi-value">R$ 0,00</div><div class="kpi-sub">$ 0,00</div></div>
                    <div class="kpi-card blue"><div class="kpi-label">Preco Medio de Compra</div><div class="kpi-value">R$ 0</div><div class="kpi-sub">BTC agora: R$ 0</div></div>
                    <div class="kpi-card"><div class="kpi-label">Lucro / Prejuizo</div><div class="kpi-value">R$ 0,00</div><div class="kpi-badge">0.00%</div></div>
                    <div class="kpi-card purple"><div class="kpi-label">BTC Agora (USD)</div><div class="kpi-value">$${btcPrice?.toLocaleString() || 0}</div><div class="kpi-sub">USD/BRL: ${usdBrl?.toFixed(2) || '...'}</div></div>
                </div>
                <div class="empty-state"><h3>Adicione suas compras para ver o dashboard</h3></div>
            `;
            return;
        }

        // Cálculos
        let totalInvestido = 0;
        let totalBTC = 0;
        compras.forEach(c => {
            totalInvestido += c.valor;
            totalBTC += c.quantidade;
        });
        const valorAtual = totalBTC * btcPrice * usdBrl;
        const precoMedio = totalInvestido / totalBTC;
        const lucroBrl = valorAtual - totalInvestido;
        const lucroPercent = (lucroBrl / totalInvestido) * 100;

        document.getElementById('page-dashboard').innerHTML = `
            <div class="kpi-grid">
                <div class="kpi-card orange"><div class="kpi-label">Total Investido</div><div class="kpi-value">${formatBRL(totalInvestido)}</div><div class="kpi-sub">${compras.length} compras</div></div>
                <div class="kpi-card orange"><div class="kpi-label">BTC Acumulado</div><div class="kpi-value btc">${formatSats(totalBTC)} sats</div><div class="kpi-sub">${totalBTC.toFixed(8)} BTC</div></div>
                <div class="kpi-card green"><div class="kpi-label">Valor Atual</div><div class="kpi-value">${formatBRL(valorAtual)}</div><div class="kpi-sub">${formatUSD(valorAtual / usdBrl)}</div></div>
                <div class="kpi-card blue"><div class="kpi-label">Preco Medio de Compra</div><div class="kpi-value">${formatBRL(precoMedio)}</div><div class="kpi-sub">BTC agora: ${formatBRL(btcPrice * usdBrl)}</div></div>
                <div class="kpi-card ${lucroBrl >= 0 ? 'green' : 'red'}"><div class="kpi-label">Lucro / Prejuizo</div><div class="kpi-value">${formatBRL(lucroBrl)}</div><div class="kpi-badge ${lucroBrl >= 0 ? 'up' : 'down'}">${lucroPercent.toFixed(2)}%</div></div>
                <div class="kpi-card purple"><div class="kpi-label">BTC Agora (USD)</div><div class="kpi-value">${formatUSD(btcPrice)}</div><div class="kpi-sub">USD/BRL: ${usdBrl.toFixed(2)}</div></div>
            </div>
            <canvas id="chart-equity" height="200" style="background:var(--bg-card);border-radius:12px;padding:1rem;"></canvas>
        `;
        
        // Renderizar gráfico de equity
        const sorted = [...compras].sort((a,b) => new Date(a.data) - new Date(b.data));
        let acumulado = 0;
        let btcAcum = 0;
        const equityData = [];
        const dates = [];
        sorted.forEach(c => {
            acumulado += c.valor;
            btcAcum += c.quantidade;
            const valorAtualEquity = btcAcum * btcPrice * usdBrl;
            equityData.push(valorAtualEquity);
            dates.push(new Date(c.data).toLocaleDateString('pt-BR'));
        });
        
        const ctx = document.getElementById('chart-equity')?.getContext('2d');
        if (ctx) {
            if (charts.equity) charts.equity.destroy();
            charts.equity = new Chart(ctx, {
                type: 'line',
                data: { labels: dates, datasets: [{ label: 'Valor do Portfólio', data: equityData, borderColor: '#10B981', tension: 0.3 }] },
                options: { responsive: true, plugins: { legend: { labels: { color: '#fff' } } } }
            });
        }
    }

    // ==================== RENDER COMPRAS ====================
    function renderCompras() {
        if (compras.length === 0) {
            document.getElementById('page-compras').innerHTML = `
                <div class="page-header"><div class="page-title">Minhas Compras</div><button class="btn-primary" onclick="addCompra()">Nova Compra</button></div>
                <div class="empty-state"><h3>Nenhuma compra registrada</h3><p>Clique em "Nova Compra" para comecar seu DCA</p></div>
            `;
            return;
        }
        
        let html = `<div class="page-header"><div class="page-title">Minhas Compras</div><div style="display:flex;gap:0.5rem;"><button class="btn-secondary" onclick="exportCSV()">Exportar CSV</button><button class="btn-primary" onclick="addCompra()">Nova Compra</button></div></div><div class="table-wrap"><table><thead><tr><th>Data</th><th>Ativo</th><th>Plataforma</th><th>Investido (R$)</th><th>Preco (R$)</th><th>Quantidade</th><th></th></tr></thead><tbody>`;
        
        compras.forEach((c, i) => {
            html += `<tr>
                <td>${new Date(c.data).toLocaleDateString('pt-BR')}</td>
                <td><span class="td-plat">${c.ativo || 'BTC'}</span></td>
                <td>${c.plataforma}</td>
                <td>${formatBRL(c.valor)}</td>
                <td>${formatBRL(c.preco)}</td>
                <td class="td-sats">${c.quantidade.toFixed(8)}</td>
                <td><button class="td-delete" onclick="deleteCompra(${i})">🗑️</button></td>
            </tr>`;
        });
        
        html += `</tbody></table></div>`;
        document.getElementById('page-compras').innerHTML = html;
    }

    // ==================== FUNÇÕES CRUD ====================
    function addCompra() {
        const data = prompt('Data (YYYY-MM-DD):', new Date().toISOString().split('T')[0]);
        if (!data) return;
        const valor = parseFloat(prompt('Valor investido (R$):', '100'));
        if (isNaN(valor)) return;
        const preco = parseFloat(prompt('Preço do BTC na compra (R$):', '300000'));
        if (isNaN(preco)) return;
        const quantidade = valor / preco;
        const plataforma = prompt('Plataforma:', 'Binance');
        
        compras.push({ data, valor, preco, quantidade, plataforma, ativo: 'BTC' });
        saveToLocalStorage();
        renderCompras();
        renderDashboard();
    }
    
    function deleteCompra(index) {
        if (confirm('Remover esta compra?')) {
            compras.splice(index, 1);
            saveToLocalStorage();
            renderCompras();
            renderDashboard();
        }
    }
    
    function clearAllData() {
        if (confirm('ATENÇÃO: Isso apagará TODOS os seus dados! Continuar?')) {
            compras = [];
            saveToLocalStorage();
            renderCompras();
            renderDashboard();
        }
    }
    
    // ==================== EXPORT/IMPORT ====================
    function exportCSV() {
        let csv = "Data,Ativo,Plataforma,Valor,Preco,Quantidade\n";
        compras.forEach(c => {
            csv += `${c.data},${c.ativo || 'BTC'},${c.plataforma},${c.valor},${c.preco},${c.quantidade}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'dca_compras.csv';
        link.click();
    }
    
    function exportJSON() {
        const data = { compras, userName };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'dca_backup.json';
        link.click();
    }
    
    function importJSON(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            try {
                const data = JSON.parse(e.target.result);
                if (data.compras) compras = data.compras;
                if (data.userName) userName = data.userName;
                saveToLocalStorage();
                renderCompras();
                renderDashboard();
                alert('Dados restaurados com sucesso!');
            } catch (err) {
                alert('Erro ao importar arquivo');
            }
        };
        reader.readAsText(file);
    }
    
    function saveNome() {
        const input = document.getElementById('admin-nome');
        if (input) {
            userName = input.value;
            saveToLocalStorage();
            alert('Nome salvo!');
        }
    }
    
    // ==================== NAVEGAÇÃO ====================
    function showPage(pageId, element) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(`page-${pageId}`).classList.add('active');
        document.querySelectorAll('.sidebar-nav-item').forEach(item => item.classList.remove('active'));
        if (element) element.classList.add('active');
        document.getElementById('topbar-title').innerHTML = pageId.charAt(0).toUpperCase() + pageId.slice(1);
        
        // Renderizar página específica
        if (pageId === 'dashboard') renderDashboard();
        else if (pageId === 'compras') renderCompras();
        else if (pageId === 'admin') {
            document.getElementById('page-admin').innerHTML = `
                <div class="page-header"><div class="page-title">Configuracoes</div></div>
                <div class="chart-card"><div class="chart-card-title">Backup Local</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;"><button class="btn-secondary" onclick="exportJSON()">Baixar JSON</button><button class="btn-secondary" onclick="document.getElementById('json-import').click()">Restaurar JSON</button></div><input type="file" id="json-import" accept=".json" onchange="importJSON(event)" style="display:none;"></div>
                <div class="chart-card"><div class="chart-card-title">Seu Nome na Vitrine</div><div style="display:flex;gap:0.5rem;"><input class="form-input" id="admin-nome" placeholder="Ex: Marcos" value="${userName}" style="flex:1;"><button class="btn-primary" onclick="saveNome()">Salvar</button></div></div>
                <div class="chart-card"><div class="chart-card-title" style="color:var(--red);">Zona de Perigo</div><button class="btn-secondary" style="border-color:rgba(239,68,68,0.3);color:var(--red);" onclick="clearAllData()">Apagar Todos os Dados</button></div>
            `;
        } else if (pageId === 'vitrine') {
            const totalInvestido = compras.reduce((acc, c) => acc + c.valor, 0);
            const totalBTC = compras.reduce((acc, c) => acc + c.quantidade, 0);
            const valorAtual = totalBTC * btcPrice * usdBrl;
            const lucroPercent = totalInvestido > 0 ? ((valorAtual - totalInvestido) / totalInvestido * 100) : 0;
            document.getElementById('page-vitrine').innerHTML = `
                <div class="vitrine-card">
                    <div class="vitrine-badge">Clube DCA</div>
                    <div class="vitrine-title">${userName}</div>
                    <div class="vitrine-subtitle">Acumulando Bitcoin com disciplina</div>
                    <div class="vitrine-kpi-grid">
                        <div class="vitrine-kpi"><div class="vitrine-kpi-label">Total Investido</div><div class="vitrine-kpi-value">${formatBRL(totalInvestido)}</div></div>
                        <div class="vitrine-kpi"><div class="vitrine-kpi-label">BTC Acumulado</div><div class="vitrine-kpi-value">${formatSats(totalBTC)} sats</div></div>
                        <div class="vitrine-kpi"><div class="vitrine-kpi-label">Lucro/Prejuizo</div><div class="vitrine-kpi-value">${lucroPercent.toFixed(2)}%</div></div>
                        <div class="vitrine-kpi"><div class="vitrine-kpi-label">Compras</div><div class="vitrine-kpi-value">${compras.length}</div></div>
                    </div>
                    <button class="vitrine-share-btn" onclick="shareVitrine()">Compartilhar Vitrine</button>
                </div>
            `;
        } else if (pageId === 'cotacao') {
            document.getElementById('page-cotacao').innerHTML = `
                <div style="padding:1rem;"><h3>Cotações BTC</h3>
                <p>Bitcoin (BTC): ${formatUSD(btcPrice)}</p>
                <p>Ethereum (ETH): ${formatUSD(ethPrice)}</p>
                <p>Solana (SOL): ${formatUSD(solPrice)}</p>
                <p>USD/BRL: ${usdBrl.toFixed(2)}</p>
                <button onclick="atualizarCotacoes()" class="btn-primary" style="margin-top:1rem;">Atualizar</button>
                </div>
            `;
        } else {
            document.getElementById(`page-${pageId}`).innerHTML = `<div class="empty-state"><h3>${pageId.toUpperCase()}</h3><p>Conteúdo em desenvolvimento</p></div>`;
        }
    }
    
    function shareVitrine() {
        const totalInvestido = compras.reduce((acc, c) => acc + c.valor, 0);
        const totalBTC = compras.reduce((acc, c) => acc + c.quantidade, 0);
        const text = `${userName} acumulou ${formatSats(totalBTC)} sats (${totalBTC.toFixed(8)} BTC) com DCA. Total investido: ${formatBRL(totalInvestido)}. Clube DCA Tracker`;
        if (navigator.share) navigator.share({ title: 'Minha Vitrine DCA', text });
        else alert('Copie o texto: ' + text);
    }
    
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        if (sidebar.style.transform === 'translateX(0px)') sidebar.style.transform = 'translateX(-100%)';
        else sidebar.style.transform = 'translateX(0px)';
    }
    
    function closeSidebar() {
        document.getElementById('sidebar').style.transform = 'translateX(-100%)';
    }
    
    // ==================== INICIALIZAÇÃO ====================
    loadFromLocalStorage();
    atualizarCotacoes();
    setInterval(atualizarCotacoes, 60000);
    renderCompras();
    
    // Expor funções globalmente
    window.showPage = showPage;
    window.addCompra = addCompra;
    window.deleteCompra = deleteCompra;
    window.clearAllData = clearAllData;
    window.exportCSV = exportCSV;
    window.exportJSON = exportJSON;
    window.importJSON = importJSON;
    window.saveNome = saveNome;
    window.shareVitrine = shareVitrine;
    window.toggleSidebar = toggleSidebar;
    window.closeSidebar = closeSidebar;
    window.atualizarCotacoes = atualizarCotacoes;
</script>
</body>
</html>
